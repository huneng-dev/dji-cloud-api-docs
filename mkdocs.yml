site_name: DJI 上云 API 文档
site_description: DJI Cloud API 文档离线镜像（中文），基于官方最新版本构建，便于 AI 读取与开发者离线查阅。
site_author: Community
site_url: https://huneng-dev.github.io/dji-cloud-api-docs/

repo_name: dji-cloud-api-docs
repo_url: https://github.com/huneng-dev/dji-cloud-api-docs

# 使用爬取得到的 output/ 目录作为文档源
docs_dir: output

# 构建输出目录（本地预览/构建用，GitHub Pages 部署时 mkdocs gh-deploy 会用到）
site_dir: site

theme:
  name: material
  language: zh
  palette:
    # 默认暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
    # 亮色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
  features:
    - navigation.instant          # 页面即时加载
    - navigation.tracking         # URL 跟随滚动
    - navigation.sections         # 章节展开
    - navigation.expand           # 默认展开侧边栏
    - navigation.indexes          # 章节索引页
    - navigation.path             # 面包屑导航
    - toc.follow                  # 右侧目录跟随滚动
    - toc.integrate               # 小屏时目录并入侧边栏
    - search.suggest              # 搜索建议
    - search.highlight            # 搜索结果高亮
    - search.share                # 分享搜索结果
    - content.code.copy           # 代码块复制按钮
    - content.code.annotate       # 代码注释
    - content.tabs.link           # 标签页联动

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\u200b\-、。，.?!;:"()]+'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/huneng-dev/dji-cloud-api-docs
  generator: false

copyright: |
  本站点为 DJI 上云 API 官方文档的社区镜像，仅供学习与交流使用。<br>
  内容版权归 DJI 大疆创新所有，如有侵权请联系删除。

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
